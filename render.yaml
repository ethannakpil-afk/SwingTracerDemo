services:
  - type: web
    name: swingtech
    runtime: python
    plan: free
    # Install FFmpeg (needed to transcode result videos) then Python deps
    buildCommand: "apt-get update && apt-get install -y ffmpeg || true; pip install -r requirements.txt"
    # Run with gunicorn. Long timeout because video analysis is slow.
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --timeout 600 --workers 1"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.10"
